name: Deploy IT Support v4

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build & Push Docker Image (AMD64)
      run: |
        az acr login --name acrcarlos69v3
        docker buildx build \
          --platform linux/amd64 \
          -t acrcarlos69v3.azurecr.io/it-support-app:v4 \
          ./app-js --push

    - name: Get AKS Credentials
      run: |
        az aks get-credentials --resource-group RG-Laboratorio20-v3 --name aks-carlos-v3 --overwrite-existing

    - name: Deploy to AKS
      run: |
        kubectl apply -f app-js/deploy.yaml
        kubectl apply -f app-js/ingress.yaml
        kubectl rollout restart deployment it-support-deployment