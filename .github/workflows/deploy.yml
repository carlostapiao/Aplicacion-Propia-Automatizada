name: Deploy IT Support v4

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    # 1. Obtener el código del repositorio
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Login en Azure usando el secreto configurado
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 3. Configurar Docker Buildx para permitir builds multi-plataforma
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 4. Construir y subir la imagen al nuevo ACR v4 (Arquitectura AMD64)
    - name: Build & Push Docker Image (v4)
      run: |
        az acr login --name acrcarlos69v4
        docker buildx build \
          --platform linux/amd64 \
          -t acrcarlos69v4.azurecr.io/it-support-app:v4 \
          ./app-js --push

    # 5. Obtener credenciales del nuevo clúster AKS v4
    - name: Get AKS Credentials
      run: |
        az aks get-credentials --resource-group RG-Laboratorio20-v4 --name aks-lab-v4 --overwrite-existing

    # 6. Desplegar los manifiestos de Kubernetes
    - name: Deploy to AKS
      run: |
        kubectl apply -f app-js/deploy.yaml
        kubectl apply -f app-js/ingress.yaml
        
    # 7. Forzar reinicio para asegurar que se use la imagen v4 recién subida
    - name: Refresh Deployment
      run: |
        kubectl rollout restart deployment it-support-deployment-v4