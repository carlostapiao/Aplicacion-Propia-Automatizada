apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: it-support-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: / # Esto es vital
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: it-support-service # Asegúrate que este nombre coincida con tu Service
            port:
              number: 80